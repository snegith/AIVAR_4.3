services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: detector
      POSTGRES_PASSWORD: detector
      POSTGRES_DB: detector_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U detector -d detector_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://detector:detector@postgres:5432/detector_db
      LANGFUSE_INGEST_HOST: http://langfuse:3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    profiles: ["langfuse"]
    ports:
      - "3000:3000"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://detector:detector@postgres:5432/langfuse_db
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-nextauth-secret-change-me
      SALT: dev-salt-change-me
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-placeholder
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-placeholder
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 512m

volumes:
  postgres_data:
